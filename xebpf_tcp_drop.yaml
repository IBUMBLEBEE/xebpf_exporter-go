metrics:
  counters:
    - name: xebpf_tcp_drop_ipv4_packets_total
      help: tcp drop ipv4 packets total
      labels:
        - name: src_ip
          size: 4
          decoders:
            - name: inet_ip
        - name: dst_port
          size: 2
          padding: 2
          decoders:
            - name: uint
        - name: dst_ip
          size: 4
          decoders:
            - name: inet_ip
